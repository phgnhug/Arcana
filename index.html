<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcana — AI Tarot Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --void: #06040f; --deep: #0c0820; --surface: #1a1635; --rim: #2a2550;
  --gold: #c9a84c; --gold-dim: #7a6330; --gold-glow: #e8c97a;
  --silver: #a8b4d0; --silver-dim: #5a6280; --text: #e2ddf5; --text-dim: #8a86a8;
  --nebula1: #3d1f6e; --nebula2: #1a2f6e; --nebula3: #6e1f3d;
  --font-display: 'Cinzel', serif; --font-body: 'Cormorant Garamond', serif;
}
body {
  background: var(--void); color: var(--text); font-family: var(--font-body);
  font-size: 17px; line-height: 1.7; min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 24px; overflow-x: hidden;
}
#stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.star { position: absolute; background: rgba(255,255,255,0.85); border-radius: 50%; animation: twinkle var(--d,3s) ease-in-out infinite var(--delay,0s); }
@keyframes twinkle { 0%,100%{opacity:var(--lo,.1);transform:scale(1)} 50%{opacity:var(--hi,.9);transform:scale(1.3)} }
.nebula { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; opacity: 0.18; animation: drift 20s ease-in-out infinite alternate; }
@keyframes drift { from{transform:translate(0,0) scale(1)} to{transform:translate(30px,20px) scale(1.1)} }

#widget {
  position: relative; z-index: 1; width: 100%; max-width: 680px;
  background: linear-gradient(160deg,#0f0c22 0%,#08061a 100%);
  border: 1px solid var(--rim); border-radius: 20px; overflow: hidden;
  box-shadow: 0 0 80px rgba(61,31,110,.35),0 0 140px rgba(26,47,110,.2),inset 0 1px 0 rgba(201,168,76,.15);
}
#header { padding: 24px 32px 18px; border-bottom: 1px solid rgba(201,168,76,.12); text-align: center; position: relative; }
.sigil { width: 40px; height: 40px; margin: 0 auto 10px; }
#header h1 { font-family: var(--font-display); font-size: 20px; font-weight: 500; letter-spacing: .18em; color: var(--gold-glow); text-shadow: 0 0 30px rgba(201,168,76,.4); }
#header p { font-size: 12px; color: var(--text-dim); letter-spacing: .08em; font-style: italic; margin-top: 3px; }
.header-right { position: absolute; top: 16px; right: 16px; display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
.lang-badge { font-size: 10px; font-family: var(--font-display); letter-spacing: .1em; color: var(--gold-dim); border: 1px solid rgba(201,168,76,.2); padding: 2px 7px; border-radius: 20px; }
.new-btn { font-size: 10px; font-family: var(--font-display); letter-spacing: .08em; color: var(--text-dim); border: 1px solid var(--rim); background: transparent; padding: 2px 7px; border-radius: 20px; cursor: pointer; transition: all .2s; display: none; }
.new-btn:hover { color: var(--gold); border-color: var(--gold-dim); }

#chat { height: 440px; overflow-y: auto; padding: 24px 28px; display: flex; flex-direction: column; gap: 18px; scrollbar-width: thin; scrollbar-color: var(--rim) transparent; }
#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-thumb { background: var(--rim); border-radius: 2px; }

.msg { display: flex; gap: 12px; animation: fadeUp .4s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
.msg.user { flex-direction: row-reverse; }
.avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; }
.avatar.oracle { background: radial-gradient(circle at 40% 40%,#3d1f6e,#0c0820); border: 1px solid rgba(201,168,76,.3); box-shadow: 0 0 12px rgba(201,168,76,.15); }
.avatar.seeker { background: var(--surface); border: 1px solid var(--rim); }
.bubble { max-width: 80%; padding: 11px 15px; border-radius: 14px; font-size: 15.5px; line-height: 1.65; }
.msg.oracle .bubble { background: var(--surface); border: 1px solid rgba(201,168,76,.1); border-radius: 4px 14px 14px 14px; color: var(--text); }
.msg.user .bubble { background: linear-gradient(135deg,#1f1a40,#2a2550); border: 1px solid var(--rim); border-radius: 14px 4px 14px 14px; color: var(--silver); }

.typing-dots { display: flex; align-items: center; gap: 5px; padding: 4px 0; }
.typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--gold-dim); animation: pulse 1.4s ease-in-out infinite; }
.typing-dots span:nth-child(2){animation-delay:.2s} .typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes pulse { 0%,80%,100%{transform:scale(.7);opacity:.4} 40%{transform:scale(1);opacity:1} }

.reading-block { display: flex; flex-direction: column; gap: 14px; width: 100%; }
.cards-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.card-wrap { perspective: 800px; width: 86px; animation: cardAppear .5s ease both; }
.card-wrap:nth-child(1){animation-delay:.1s} .card-wrap:nth-child(2){animation-delay:.4s} .card-wrap:nth-child(3){animation-delay:.7s}
@keyframes cardAppear { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
.card-inner { width: 86px; height: 140px; position: relative; transform-style: preserve-3d; animation: flipIn .8s cubic-bezier(.4,0,.2,1) both; }
.card-wrap:nth-child(1) .card-inner{animation-delay:.3s} .card-wrap:nth-child(2) .card-inner{animation-delay:.6s} .card-wrap:nth-child(3) .card-inner{animation-delay:.9s}
@keyframes flipIn { 0%{transform:rotateY(-180deg)} 100%{transform:rotateY(0deg)} }
.card-face,.card-back { position: absolute; inset: 0; border-radius: 8px; backface-visibility: hidden; -webkit-backface-visibility: hidden; }
.card-back { transform: rotateY(180deg); background: linear-gradient(160deg,#1a1635,#0c0820); border: 1px solid rgba(201,168,76,.25); display: flex; align-items: center; justify-content: center; }
.card-face { background: var(--deep); border: 1px solid rgba(201,168,76,.35); display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 5px 4px 7px; overflow: hidden; }
.card-face .card-label { font-family: var(--font-display); font-size: 7px; letter-spacing: .08em; color: var(--gold-dim); text-align: center; line-height: 1.3; }
.card-face .card-position { font-size: 7.5px; color: var(--silver-dim); letter-spacing: .05em; }
.card-face svg { flex: 1; width: 100%; padding: 2px; }

.sections { display: flex; flex-direction: column; gap: 8px; }
.section { background: rgba(26,22,53,.6); border: 1px solid rgba(201,168,76,.08); border-left: 2px solid var(--gold-dim); border-radius: 0 8px 8px 0; padding: 9px 13px; animation: fadeUp .4s ease both; }
.section:nth-child(1){animation-delay:1.2s} .section:nth-child(2){animation-delay:1.5s} .section:nth-child(3){animation-delay:1.8s}
.section-title { font-family: var(--font-display); font-size: 9px; letter-spacing: .15em; color: var(--gold); margin-bottom: 4px; }
.section-text { font-size: 14px; color: var(--text); line-height: 1.65; }

.suggestions { display: flex; gap: 7px; flex-wrap: wrap; padding: 0 2px; }
.sugg-pill { font-size: 12px; font-family: var(--font-body); font-style: italic; color: var(--text-dim); border: 1px solid var(--rim); padding: 4px 11px; border-radius: 20px; cursor: pointer; transition: all .2s; background: transparent; white-space: nowrap; }
.sugg-pill:hover { color: var(--gold); border-color: var(--gold-dim); background: rgba(201,168,76,.05); }

.divider { display: flex; align-items: center; gap: 10px; margin: 2px 0; opacity: .35; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background: var(--gold-dim); }
.divider span { font-size: 11px; color: var(--gold-dim); white-space: nowrap; }

#input-area { padding: 14px 22px 18px; border-top: 1px solid rgba(201,168,76,.1); display: flex; flex-direction: column; gap: 10px; }
.input-row { display: flex; gap: 10px; align-items: flex-end; }
#q { flex: 1; background: var(--surface); border: 1px solid var(--rim); border-radius: 12px; color: var(--text); font-family: var(--font-body); font-size: 16px; padding: 10px 14px; resize: none; min-height: 44px; max-height: 120px; outline: none; transition: border-color .2s; line-height: 1.5; }
#q::placeholder { color: var(--text-dim); font-style: italic; }
#q:focus { border-color: rgba(201,168,76,.35); }
#send { width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0; background: linear-gradient(135deg,#2a1f50,#1a1635); border: 1px solid rgba(201,168,76,.3); color: var(--gold); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; }
#send:hover { background: linear-gradient(135deg,#3a2a6a,#2a2050); box-shadow: 0 0 16px rgba(201,168,76,.2); }
#send:disabled { opacity: .4; cursor: not-allowed; }
</style>
</head>
<body>
<div id="stars"></div>
<div class="nebula" style="width:500px;height:500px;background:var(--nebula1);top:-100px;left:-100px;animation-duration:18s"></div>
<div class="nebula" style="width:400px;height:400px;background:var(--nebula2);bottom:-80px;right:-80px;animation-duration:24s;animation-direction:alternate-reverse"></div>
<div class="nebula" style="width:300px;height:300px;background:var(--nebula3);top:40%;left:60%;animation-duration:30s"></div>

<div id="widget">
  <div id="header">
    <svg class="sigil" viewBox="0 0 44 44" fill="none">
      <ellipse cx="22" cy="22" rx="18" ry="10" stroke="#c9a84c" stroke-width="0.8" opacity="0.6"/>
      <circle cx="22" cy="22" r="6" stroke="#c9a84c" stroke-width="0.8"/>
      <circle cx="22" cy="22" r="2.5" fill="#c9a84c" opacity="0.8"/>
      <line x1="22" y1="4" x2="22" y2="10" stroke="#c9a84c" stroke-width="0.7" opacity="0.4"/>
      <line x1="22" y1="34" x2="22" y2="40" stroke="#c9a84c" stroke-width="0.7" opacity="0.4"/>
      <line x1="4" y1="22" x2="10" y2="22" stroke="#c9a84c" stroke-width="0.7" opacity="0.4"/>
      <line x1="34" y1="22" x2="40" y2="22" stroke="#c9a84c" stroke-width="0.7" opacity="0.4"/>
      <line x1="8" y1="8" x2="13" y2="13" stroke="#c9a84c" stroke-width="0.7" opacity="0.25"/>
      <line x1="31" y1="31" x2="36" y2="36" stroke="#c9a84c" stroke-width="0.7" opacity="0.25"/>
      <line x1="36" y1="8" x2="31" y2="13" stroke="#c9a84c" stroke-width="0.7" opacity="0.25"/>
      <line x1="8" y1="36" x2="13" y2="31" stroke="#c9a84c" stroke-width="0.7" opacity="0.25"/>
    </svg>
    <h1>ARCANA</h1>
    <p>The cards speak what words cannot</p>
    <div class="header-right">
      <span class="lang-badge" id="lang-badge">AUTO</span>
      <button class="new-btn" id="new-btn" onclick="newReading()">✦ new reading</button>
    </div>
  </div>
  <div id="chat"></div>
  <div id="input-area">
    <div class="suggestions" id="suggs"></div>
    <div class="input-row">
      <textarea id="q" placeholder="Ask the cards, or speak freely…" rows="1" onkeydown="handleKey(event)" oninput="resize(this)"></textarea>
      <button id="send" onclick="send()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M2 9h14M9 2l7 7-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
/* STARFIELD */
const starsEl = document.getElementById('stars');
for (let i = 0; i < 120; i++) {
  const s = document.createElement('div'); s.className = 'star';
  const sz = Math.random()<.15?Math.random()*2+1.5:Math.random()*1.2+.4;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(2+Math.random()*4).toFixed(1)}s;--delay:-${(Math.random()*4).toFixed(1)}s;--lo:${(.05+Math.random()*.1).toFixed(2)};--hi:${(.5+Math.random()*.5).toFixed(2)}`;
  starsEl.appendChild(s);
}

/* CARD SYMBOLS */
const SYM = {
  'The Fool':          '<circle cx="32" cy="18" r="7" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/><path d="M20 38 Q32 20 44 38" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/>',
  'The Magician':      '<rect x="22" y="14" width="20" height="20" rx="2" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/><circle cx="32" cy="8" r="2.5" fill="#c9a84c" opacity="0.8"/><line x1="32" y1="10.5" x2="32" y2="14" stroke="#c9a84c" stroke-width="0.9"/>',
  'The High Priestess':'<path d="M32 10 L20 42 L32 36 L44 42 Z" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/><circle cx="32" cy="22" r="4" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/>',
  'The Empress':       '<circle cx="32" cy="24" r="14" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/><path d="M26 24 Q32 16 38 24 Q32 32 26 24Z" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.6"/>',
  'The Emperor':       '<rect x="20" y="12" width="24" height="24" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/><line x1="20" y1="24" x2="44" y2="24" stroke="#c9a84c" stroke-width="0.6" opacity="0.4"/><line x1="32" y1="12" x2="32" y2="36" stroke="#c9a84c" stroke-width="0.6" opacity="0.4"/>',
  'The Hierophant':    '<line x1="32" y1="10" x2="32" y2="42" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/><line x1="20" y1="22" x2="44" y2="22" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/><line x1="24" y1="30" x2="40" y2="30" stroke="#c9a84c" stroke-width="0.9" opacity="0.5"/>',
  'The Lovers':        '<path d="M26 28 Q32 14 38 28" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/><circle cx="26" cy="30" r="4" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.6"/><circle cx="38" cy="30" r="4" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.6"/>',
  'The Chariot':       '<rect x="22" y="20" width="20" height="16" rx="2" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/><circle cx="26" cy="38" r="3" fill="none" stroke="#c9a84c" stroke-width="0.8"/><circle cx="38" cy="38" r="3" fill="none" stroke="#c9a84c" stroke-width="0.8"/>',
  'Strength':          '<path d="M22 26 Q32 12 42 26 Q32 40 22 26Z" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/>',
  'The Hermit':        '<path d="M28 42 L32 12 L36 42" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/><circle cx="32" cy="20" r="5" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.6"/>',
  'Wheel of Fortune':  '<circle cx="32" cy="26" r="14" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/><circle cx="32" cy="26" r="5" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/><line x1="32" y1="12" x2="32" y2="40" stroke="#c9a84c" stroke-width="0.6" opacity="0.3"/><line x1="18" y1="26" x2="46" y2="26" stroke="#c9a84c" stroke-width="0.6" opacity="0.3"/>',
  'Justice':           '<rect x="24" y="14" width="16" height="24" rx="1" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/><line x1="22" y1="22" x2="42" y2="22" stroke="#c9a84c" stroke-width="0.9" opacity="0.6"/>',
  'The Hanged Man':    '<line x1="32" y1="10" x2="32" y2="40" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/><circle cx="32" cy="38" r="5" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.6"/>',
  'Death':             '<path d="M32 10 L44 42 L20 42 Z" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/>',
  'Temperance':        '<rect x="26" y="12" width="8" height="18" rx="4" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/><rect x="30" y="22" width="8" height="18" rx="4" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.5"/>',
  'The Devil':         '<path d="M32 10 L20 40 L44 40 Z" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/><circle cx="32" cy="26" r="5" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/>',
  'The Tower':         '<rect x="26" y="12" width="12" height="28" rx="2" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/><path d="M24 14 Q32 8 40 14" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.6"/>',
  'The Star':          '<polygon points="32,10 35,22 47,22 37,30 41,42 32,34 23,42 27,30 17,22 29,22" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.7"/>',
  'The Moon':          '<path d="M38 14 Q20 20 20 30 Q20 40 32 42 Q20 38 22 26 Q24 14 38 14Z" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/>',
  'The Sun':           '<circle cx="32" cy="26" r="10" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/><line x1="32" y1="10" x2="32" y2="14" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/><line x1="32" y1="38" x2="32" y2="42" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/><line x1="16" y1="26" x2="20" y2="26" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/><line x1="44" y1="26" x2="48" y2="26" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/>',
  'Judgement':         '<path d="M32 10 Q44 16 44 26 Q44 36 32 42 Q20 36 20 26 Q20 16 32 10Z" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/>',
  'The World':         '<ellipse cx="32" cy="26" rx="14" ry="18" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.7"/><ellipse cx="32" cy="26" rx="5" ry="8" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/>',
};
const DECK = Object.keys(SYM);
const POS = ['Past','Present','Future'];
const LANG_NAMES = { en:'English', pl:'Polski', vi:'Tiếng Việt', fr:'Français', zh:'中文', ru:'Русский' };

/* STATE */
let history = [];
let state = { hasReading: false, cards: null, turns: 0 };

/* SYSTEM PROMPT */
const SYSTEM = `You are Arcana, a mystical and deeply empathetic tarot oracle. You speak with poetic, evocative language — warm, wise, never cold or mechanical. You have full memory of the entire conversation.

Rules:
1. CASUAL CHAT (greetings, small talk, "hi", "hello", "how are you", idle curiosity): Respond warmly and naturally in plain text, staying in character as the Oracle. Welcome the seeker, perhaps ask their name or what brought them here. Do NOT draw cards or mention readings unless the seeker brings it up. Keep it to 1-3 sentences.

2. READING REQUEST (the seeker asks a question, seeks guidance, or cards are injected): Cards will be injected in the user message. Respond ONLY with valid JSON (no backticks, no markdown):
   {"intro":"...","past":"...","present":"...","future":"...","closing":"..."}
   - intro: one evocative sentence (max 20 words)
   - past/present/future: 2-3 poetic sentences tied to the seeker's question
   - closing: one mystical synthesis sentence (max 25 words)

3. FOLLOW-UP CONVERSATION: Respond naturally in plain text. Reference the cards already drawn. Be warm, empathetic, concise (2-4 sentences unless depth is requested). Ask the seeker questions back. Never say "as an AI".

4. ALWAYS match the seeker's language exactly.

5. If the seeker shares feelings or fears, lead with empathy before interpreting cards.`;

/* UTILS */
function pickCards() {
  const d=[...DECK]; const out=[];
  for(let i=0;i<3;i++){const x=Math.floor(Math.random()*d.length);out.push(d.splice(x,1)[0]);}
  return out;
}
function detectLang(t) {
  if(/[\u0400-\u04FF]/.test(t)) return 'ru';
  if(/[\u4E00-\u9FFF\u3040-\u30FF]/.test(t)) return 'zh';
  if(/[ąćęłńóśźżĄĆĘŁŃÓŚŹŻ]/.test(t)) return 'pl';
  if(/[àáâăêếềệìíòóôõùúýđ]/i.test(t)) return 'vi';
  if(/[àáâãäèéêëìíîïòóôõöùúûü]/i.test(t)) return 'fr';
  return 'en';
}
function isNewRequest(t) {
  return /new (reading|spread|question)|draw (new|again)|another reading/i.test(t)
      || /nowe (karty|czytanie)|xem bài mới|câu hỏi khác/i.test(t);
}
function isCasualChat(t) {
  const s = t.trim().toLowerCase();
  if (/^(hi|hello|hey|hiya|sup|yo|helo|cześć|czesc|chào|xin chào|bonjour|salut|привет|你好)[\s!?.]*$/.test(s)) return true;
  if (/^(how are you|what.s up|good (morning|evening|night|day)|nice to meet|my name is)[\s!?.]*$/i.test(s)) return true;
  // short (<=4 words), no question mark, no guidance-seeking keywords
  const words = s.split(/\s+/).length;
  const hasGuidance = /\?|love|career|money|future|relationship|work|help|feel|afraid|worry|should|will i|am i|what|how|why|when/.test(s);
  return words <= 4 && !hasGuidance;
}

/* DOM */
const chatEl = document.getElementById('chat');
const sendBtn = document.getElementById('send');
const qEl = document.getElementById('q');
const suggsEl = document.getElementById('suggs');

function msg(role, html, anim=true) {
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  if(!anim) d.style.animation='none';
  d.innerHTML = `<div class="avatar ${role}">${role==='oracle'?'✦':'◈'}</div><div class="bubble">${html}</div>`;
  chatEl.appendChild(d); chatEl.scrollTop=chatEl.scrollHeight; return d;
}
function showTyping() {
  const d=document.createElement('div'); d.className='msg oracle'; d.id='typ';
  d.innerHTML=`<div class="avatar oracle">✦</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chatEl.appendChild(d); chatEl.scrollTop=chatEl.scrollHeight;
}
function hideTyping() { document.getElementById('typ')?.remove(); }
function divider(label) {
  const d=document.createElement('div'); d.className='divider'; d.innerHTML=`<span>${label}</span>`;
  chatEl.appendChild(d);
}
function setSuggs(pills) {
  suggsEl.innerHTML='';
  pills.forEach(p=>{
    const b=document.createElement('button'); b.className='sugg-pill'; b.textContent=p;
    b.onclick=()=>{ qEl.value=p; qEl.focus(); resize(qEl); setSuggs([]); };
    suggsEl.appendChild(b);
  });
}

/* CARD RENDER */
function cardHTML(name, pos) {
  const s = SYM[name]||'<circle cx="32" cy="26" r="10" fill="none" stroke="#c9a84c" stroke-width="0.9" opacity="0.6"/>';
  return `<div class="card-wrap"><div class="card-inner">
    <div class="card-face">
      <span class="card-position">${pos}</span>
      <svg viewBox="12 8 40 36">${s}</svg>
      <span class="card-label">${name}</span>
    </div>
    <div class="card-back">
      <svg width="28" height="28" viewBox="0 0 44 44">
        <circle cx="22" cy="22" r="18" fill="none" stroke="rgba(201,168,76,0.3)" stroke-width="0.8"/>
        <polygon points="22,6 26,18 38,18 28,26 32,38 22,30 12,38 16,26 6,18 18,18" fill="none" stroke="rgba(201,168,76,0.25)" stroke-width="0.8"/>
      </svg>
    </div>
  </div></div>`;
}

function renderReading(cards, r) {
  divider('✦ the cards speak ✦');
  msg('oracle', `<em>${r.intro}</em>`);
  setTimeout(()=>{
    const w=document.createElement('div'); w.style.paddingLeft='44px';
    w.innerHTML=`<div class="reading-block">
      <div class="cards-row">${cards.map((c,i)=>cardHTML(c,POS[i])).join('')}</div>
      <div class="sections">${[r.past,r.present,r.future].map((s,i)=>`
        <div class="section">
          <div class="section-title">${POS[i].toUpperCase()} · ${cards[i].toUpperCase()}</div>
          <div class="section-text">${s}</div>
        </div>`).join('')}
      </div></div>`;
    chatEl.appendChild(w); chatEl.scrollTop=chatEl.scrollHeight;
    setTimeout(()=>{
      divider('· · ·');
      msg('oracle',`<em style="color:var(--silver)">${r.closing}</em>`);
      sendBtn.disabled=false;
      document.getElementById('new-btn').style.display='block';
      setSuggs([`Tell me more about ${cards[1]}`, 'What should I do next?', 'Is there hope in this reading?']);
      chatEl.scrollTop=chatEl.scrollHeight;
    }, 2000);
  }, 400);
}

/* API */
/* API */
async function callAPI(userText, newCards) {
  const lang = detectLang(userText);
  document.getElementById('lang-badge').textContent=(LANG_NAMES[lang]||'AUTO').substring(0,3).toUpperCase();

  let content = userText;
  if (newCards) {
    content = `${userText}\n\n[Cards drawn — Past: ${newCards[0]}, Present: ${newCards[1]}, Future: ${newCards[2]}. Respond in JSON format.]`;
  }

  history.push({role:'user', content});

  const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer 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',
      'HTTP-Referer': 'https://phgnhug.github.io/Arcana',
      'X-Title': 'Arcana Tarot'
    },
    body: JSON.stringify({
      model: 'mistralai/mistral-7b-instruct:free',
      max_tokens: 1000,
      messages: [
        {role: 'system', content: SYSTEM},
        ...history
      ]
    })
  });

  const data = await res.json();
  const raw = data.choices?.[0]?.message?.content || '';
  history.push({role:'assistant', content: raw});
  return raw;
}
/* MAIN */
async function send() {
  const q = qEl.value.trim();
  if (!q || sendBtn.disabled) return;
  setSuggs([]);
  msg('seeker', q);
  qEl.value=''; resize(qEl);
  sendBtn.disabled=true;
  showTyping();
  state.turns++;

  try {
    const casual = isCasualChat(q);
    const needCards = !casual && (!state.hasReading || isNewRequest(q));
    const cards = needCards ? pickCards() : null;
    if (needCards) { state.cards=cards; state.hasReading=true; }

    const raw = await callAPI(q, cards);
    hideTyping();

    if (needCards) {
      try {
        const r = JSON.parse(raw.replace(/```json|```/g,'').trim());
        renderReading(cards, r);
      } catch {
        msg('oracle', raw); sendBtn.disabled=false;
      }
    } else {
      msg('oracle', raw);
      sendBtn.disabled=false;
      // show reading prompts after casual warmup if no reading yet
      if (!state.hasReading && state.turns >= 2) {
        setSuggs(['What does my future hold?','Love & relationships','A difficult decision']);
      } else if (state.turns===3) {
        setSuggs(['What energy surrounds me?','How do I move forward?']);
      } else if (state.turns%4===0 && state.hasReading) {
        setSuggs(['Draw a clarifying card','Ask about love','Ask about purpose']);
      }
    }
  } catch(e) {
    hideTyping();
    msg('oracle','The veil is thick tonight… the cosmos could not reach me. Please try again.');
    sendBtn.disabled=false;
  }
}

function newReading() {
  state={hasReading:false,cards:null,turns:0}; history=[];
  setSuggs([]);
  divider('✦ new session begins ✦');
  msg('oracle','The cards are shuffled anew. What question stirs in your heart?');
  document.getElementById('new-btn').style.display='none';
}
